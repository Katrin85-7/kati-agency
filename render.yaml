# Soul Method Telegram bot · Render free · без карты
services:
  - type: web
    name: soul-method-workbook-bot
    runtime: docker
    rootDir: tools/soul-workbook-bot
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ACCESS_CODE
        value: SOUL-KATI-2026
      - key: WEBHOOK_URL
        fromService:
          type: web
          name: soul-method-workbook-bot
          property: host
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: PDF_DIR
        value: /app/pdfs
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: "10000"

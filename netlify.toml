# Kati Agency — статический HTML, сборка не нужна
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Пустая команда в UI иногда ломает деплой — явный no-op для Linux-сборщика Netlify
  command = "echo 'Static site: no build'"
  publish = "."

# Если в UI Netlify указан Base directory — он должен быть ПУСТЫМ.
# Publish directory = "." (точка), НЕ dist / build / public.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
